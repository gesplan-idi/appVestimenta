<h1>Usuarios</h1>

<p style="font-size:12px;color:#666">
  Último evento SSE: <b>{{ lastEvent() }}</b>
</p>

<div *ngIf="loading()">Cargando usuarios…</div>
<div *ngIf="error()" style="color:red">Error: {{ error() }}</div>

<ul *ngIf="users().length">
  <li *ngFor="let u of users()">
    <strong>{{ u.nombre ?? 'Sin nombre' }}</strong>
    <span *ngIf="u.apellidos"> — {{ u.apellidos }}</span>
    <small *ngIf="u.code" style="color:#888"> ({{ u.code }})</small>
  </li>
</ul>
