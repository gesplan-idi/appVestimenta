<div class="plan">
  <svg class="plan-svg"
       [attr.viewBox]="'0 0 ' + pdfW + ' ' + pdfH"
       preserveAspectRatio="xMidYMid meet">
    <image [attr.href]="planSrc"
           [attr.width]="pdfW"
           [attr.height]="pdfH"
           class="base-image"></image>

    <g *ngFor="let h of hotspots; trackBy: trackById"
       (click)="onHotspotClick(h, $event)">
      <circle class="hotspot"
              [attr.cx]="h.cx"
              [attr.cy]="h.cy"
              [attr.r]="h.hitR ?? h.r"></circle>
    </g>
  </svg>
</div>

<!-- Backdrop (solo si hay modal y seleccionado) -->
<div class="modal-backdrop show" *ngIf="showDialog && selected" (click)="cancelDialog()"></div>

<!-- Modal compacto centrado -->
<div class="modal fade show d-block modal-compact"
     *ngIf="showDialog && selected"
     role="dialog" aria-modal="true" aria-labelledby="reservaTitle">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header py-1">
        <h5 class="modal-title fs-6 mb-0" id="reservaTitle">
          Puesto seleccionado: <strong>#{{ selected!.label }}</strong>
        </h5>
        <button type="button" class="btn-close" aria-label="Close" (click)="cancelDialog()"></button>
      </div>

      <div class="modal-body py-2">
        <form class="vstack gap-2">
          <div>
            <label class="form-label mb-1 small">Fecha</label>
            <input type="date"
                   class="form-control form-control-sm"
                   [(ngModel)]="date"
                   name="date">
          </div>

          <div>
            <label class="form-label mb-1 small d-block">Tipo de reserva</label>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="mode" id="mode1"
                     value="single" [(ngModel)]="mode">
              <label class="form-check-label small" for="mode1">Un día</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="mode" id="mode2"
                     value="weekdays" [(ngModel)]="mode">
              <label class="form-check-label small" for="mode2">De lunes a viernes</label>
            </div>
          </div>
        </form>
      </div>

      <div class="modal-footer py-1">
        <button type="button" class="btn btn-outline-secondary btn-sm" (click)="cancelDialog()">Cancelar</button>
        <button type="button" class="btn btn-primary btn-sm" (click)="acceptDialog()">Aceptar</button>
      </div>
    </div>
  </div>
</div>
